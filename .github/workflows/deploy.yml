name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate content manifests
        run: |
          ls data/projects/*.md | xargs -n1 basename | jq -R . | jq -s . > data/projects/index.json
          ls data/updates/*.md  | xargs -n1 basename | jq -R . | jq -s . > data/updates/index.json

      - name: Inject commit SHA as cache-bust token
        run: sed -i "s/__CACHE_BUST__/${{ github.sha }}/g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
